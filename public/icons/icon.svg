<svg xmlns='http://www.w3.org/2000/svg' width='512' height='512' viewBox='0 0 512 512'>
  <defs>
    <linearGradient id='bgGrad' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#1e1e12'/>
      <stop offset='100%' stop-color='#111109'/>
    </linearGradient>
    <linearGradient id='fillGrad' x1='0' y1='1' x2='0' y2='0'>
      <stop offset='0%' stop-color='#2e7a2c'/>
      <stop offset='60%' stop-color='#7cb87a'/>
      <stop offset='100%' stop-color='#a8d8a6'/>
    </linearGradient>
    <linearGradient id='cupGrad' x1='0' y1='0' x2='1' y2='0'>
      <stop offset='0%' stop-color='#3a3a28'/>
      <stop offset='50%' stop-color='#4a4a34'/>
      <stop offset='100%' stop-color='#363626'/>
    </linearGradient>
    <clipPath id='cupInterior'>
      <path d='M 156 156 L 356 156 L 328 380 L 184 380 Z'/>
    </clipPath>
    <filter id='fillGlow' x='-10%' y='-10%' width='120%' height='120%'>
      <feGaussianBlur in='SourceGraphic' stdDeviation='4' result='blur'/>
      <feMerge>
        <feMergeNode in='blur'/>
        <feMergeNode in='SourceGraphic'/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width='512' height='512' rx='108' fill='url(#bgGrad)'/>
  <rect x='6' y='6' width='500' height='500' rx='104' fill='none' stroke='#ffffff' stroke-width='1.5' stroke-opacity='0.06'/>

  <!-- Ambient green glow behind cup -->
  <ellipse cx='256' cy='290' rx='140' ry='110' fill='#7cb87a' opacity='0.07'/>

  <!-- Cup base (flat foot) -->
  <rect x='168' y='388' width='176' height='18' rx='9' fill='url(#cupGrad)'/>

  <!-- Cup body fill -->
  <path d='M 148 148 L 364 148 L 336 388 L 176 388 Z' fill='url(#cupGrad)'/>

  <!-- Green liquid fill -->
  <g clip-path='url(#cupInterior)' filter='url(#fillGlow)'>
    <rect x='140' y='241' width='232' height='145' fill='url(#fillGrad)'/>
    <path d='M 167 241 Q 256 234 345 241' stroke='#c8f0c6' stroke-width='3' fill='none' opacity='0.5'/>
    <rect x='192' y='255' width='14' height='100' rx='7' fill='#ffffff' opacity='0.07'/>
  </g>

  <!-- Cup wall outline -->
  <path d='M 148 148 L 364 148 L 336 388 L 176 388 Z' fill='none' stroke='#6a6a50' stroke-width='8' stroke-linejoin='round'/>

  <!-- Top rim -->
  <path d='M 144 148 L 368 148' stroke='#7a7a5a' stroke-width='10' stroke-linecap='round'/>

  <!-- Pour spout -->
  <path d='M 364 152 L 408 116 L 418 128 L 390 152 Z' fill='url(#cupGrad)' stroke='#6a6a50' stroke-width='7' stroke-linejoin='round'/>

  <!-- Handle -->
  <path
    d='M 177 224 C 160 224 110 244 110 272 C 110 300 160 322 177 322
       L 177 302 C 164 302 132 288 132 272 C 132 256 164 244 177 244 Z'
    fill='url(#cupGrad)' stroke='#6a6a50' stroke-width='5' stroke-linejoin='round'
  />

  <!-- Graduation marks -->
  <g stroke='#5a5a3e' stroke-width='4' stroke-linecap='round' opacity='0.7'>
    <line x1='296' y1='212' x2='318' y2='212'/>
    <line x1='290' y1='268' x2='318' y2='268'/>
    <line x1='283' y1='324' x2='312' y2='324'/>
  </g>
  <line x1='293' y1='241' x2='322' y2='241' stroke='#8fce8d' stroke-width='5' stroke-linecap='round' opacity='0.8'/>

  <!--
    WHITE LABEL on cup body, upper-left area
    Rounded rectangle, slightly rotated, like a paper sticker
    Centred around (218, 213), width=72, height=84
  -->
  <g transform='translate(218,213) rotate(-6)'>
    <!-- Label shadow -->
    <rect x='-37' y='-43' width='74' height='86' rx='10' fill='#000000' opacity='0.18' transform='translate(2,3)'/>
    <!-- Label body -->
    <rect x='-37' y='-43' width='74' height='86' rx='10' fill='#f5f0e8'/>
    <!-- Label inner border (subtle) -->
    <rect x='-33' y='-39' width='66' height='78' rx='8' fill='none' stroke='#d4c9a8' stroke-width='1.5' opacity='0.6'/>

    <!--
      WHEAT EAR (колосок) - dark amber/golden, centred on label
      Stem: vertical line from bottom
      Grains: pairs of small ellipses on alternating sides, going up
    -->
    <g fill='#c8860a' stroke='#a06508' stroke-width='1'>
      <!-- Stem -->
      <line x1='0' y1='32' x2='0' y2='-6' stroke='#c8860a' stroke-width='3' stroke-linecap='round'/>

      <!-- Bottom pair of grains (widest) -->
      <ellipse cx='-9' cy='16' rx='9' ry='6' transform='rotate(-35,-9,16)'/>
      <ellipse cx='9' cy='13' rx='9' ry='6' transform='rotate(35,9,13)'/>

      <!-- Middle pair -->
      <ellipse cx='-9' cy='2' rx='9' ry='6' transform='rotate(-35,-9,2)'/>
      <ellipse cx='9' cy='-1' rx='9' ry='6' transform='rotate(35,9,-1)'/>

      <!-- Upper pair -->
      <ellipse cx='-8' cy='-13' rx='8' ry='5.5' transform='rotate(-35,-8,-13)'/>
      <ellipse cx='8' cy='-16' rx='8' ry='5.5' transform='rotate(35,8,-16)'/>

      <!-- Top single grain (tip) -->
      <ellipse cx='0' cy='-28' rx='6' ry='8'/>

      <!-- Awns (усики) at the top -->
      <line x1='0' y1='-36' x2='-6' y2='-52' stroke='#c8860a' stroke-width='2' stroke-linecap='round'/>
      <line x1='0' y1='-36' x2='0' y2='-54' stroke='#c8860a' stroke-width='2' stroke-linecap='round'/>
      <line x1='0' y1='-36' x2='6' y2='-52' stroke='#c8860a' stroke-width='2' stroke-linecap='round'/>

      <!-- Highlight sheen on grains -->
      <ellipse cx='-9' cy='14' rx='3.5' ry='2' transform='rotate(-35,-9,14)' fill='#f5c842' stroke='none' opacity='0.5'/>
      <ellipse cx='9' cy='11' rx='3.5' ry='2' transform='rotate(35,9,11)' fill='#f5c842' stroke='none' opacity='0.5'/>
      <ellipse cx='-9' cy='0' rx='3.5' ry='2' transform='rotate(-35,-9,0)' fill='#f5c842' stroke='none' opacity='0.5'/>
      <ellipse cx='9' cy='-3' rx='3.5' ry='2' transform='rotate(35,9,-3)' fill='#f5c842' stroke='none' opacity='0.5'/>
      <ellipse cx='-8' cy='-15' rx='3' ry='2' transform='rotate(-35,-8,-15)' fill='#f5c842' stroke='none' opacity='0.5'/>
      <ellipse cx='8' cy='-18' rx='3' ry='2' transform='rotate(35,8,-18)' fill='#f5c842' stroke='none' opacity='0.5'/>
    </g>
  </g>

</svg>
