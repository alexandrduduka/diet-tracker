<svg xmlns='http://www.w3.org/2000/svg' width='512' height='512' viewBox='0 0 512 512'>
  <defs>
    <linearGradient id='bgGrad' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#1e1e12'/>
      <stop offset='100%' stop-color='#111109'/>
    </linearGradient>
    <!-- Arc gradient: darker green at start (bottom-right), brighter at top, lighter at tip (bottom-left) -->
    <linearGradient id='arcGrad' x1='1' y1='1' x2='0' y2='0'>
      <stop offset='0%' stop-color='#3a8c38'/>
      <stop offset='45%' stop-color='#7cb87a'/>
      <stop offset='100%' stop-color='#b2e0b0'/>
    </linearGradient>
    <linearGradient id='seedGrad' x1='0.3' y1='0' x2='0.7' y2='1'>
      <stop offset='0%' stop-color='#f5c842'/>
      <stop offset='100%' stop-color='#c47a2a'/>
    </linearGradient>
    <filter id='arcGlow' x='-20%' y='-20%' width='140%' height='140%'>
      <feGaussianBlur in='SourceGraphic' stdDeviation='6' result='blur'/>
      <feMerge>
        <feMergeNode in='blur'/>
        <feMergeNode in='SourceGraphic'/>
      </feMerge>
    </filter>
    <filter id='seedGlow' x='-60%' y='-60%' width='220%' height='220%'>
      <feGaussianBlur in='SourceGraphic' stdDeviation='10' result='blur'/>
      <feMerge>
        <feMergeNode in='blur'/>
        <feMergeNode in='SourceGraphic'/>
      </feMerge>
    </filter>
    <filter id='budGlow' x='-60%' y='-60%' width='220%' height='220%'>
      <feGaussianBlur in='SourceGraphic' stdDeviation='5' result='blur'/>
      <feMerge>
        <feMergeNode in='blur'/>
        <feMergeNode in='SourceGraphic'/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width='512' height='512' rx='108' fill='url(#bgGrad)'/>
  <rect x='6' y='6' width='500' height='500' rx='104' fill='none' stroke='#ffffff' stroke-width='1.5' stroke-opacity='0.06'/>

  <!-- Ambient glow: green at top half of arc area -->
  <ellipse cx='256' cy='220' rx='130' ry='90' fill='#7cb87a' opacity='0.06'/>
  <!-- Ambient glow: amber at seed -->
  <ellipse cx='256' cy='395' rx='55' ry='35' fill='#d4a24c' opacity='0.14'/>

  <!--
    Arc geometry:
    Centre (256,256), radius 155, stroke-width 34
    Gap at visual bottom (6 o'clock), spanning ±30° = 60° total gap

    In SVG (y-axis down, standard trig where sin(90°)=1 points down):
      Gap right edge: angle=60°  → (256+155·cos60°, 256+155·sin60°) = (333.5, 390.2)
      Gap left edge:  angle=120° → (256+155·cos120°, 256+155·sin120°) = (178.5, 390.2)

    Arc: start at gap-right (333.5, 390.2), CCW 300° to gap-left (178.5, 390.2)
    SVG path: M 333.5 390.2 A 155 155 0 1 0 178.5 390.2
    (large-arc-flag=1, sweep-flag=0 = CCW in SVG)

    The arc travels: bottom-right → right → top → left → bottom-left
    The "growing tip" = endpoint at bottom-left (178.5, 390.2)
    The sprout "origin" = near bottom-right (333.5, 390.2), connecting to seed

    Seed sits at visual bottom of the gap: (256, 411) i.e. (256, 256+155)
    We position seed slightly inward at (256, 400)
  -->

  <!-- Track ring: the unfilled portion of the circle -->
  <circle cx='256' cy='256' r='155' fill='none' stroke='#252518' stroke-width='34'/>

  <!-- Green filled arc: CCW from gap-right (333.5,390.2) to gap-left (178.5,390.2), 300° -->
  <path
    d='M 333.5 390.2 A 155 155 0 1 0 178.5 390.2'
    fill='none'
    stroke='url(#arcGrad)'
    stroke-width='34'
    stroke-linecap='round'
    filter='url(#arcGlow)'
  />

  <!-- Subtle inner highlight shimmer on arc -->
  <path
    d='M 333.5 390.2 A 155 155 0 1 0 178.5 390.2'
    fill='none'
    stroke='#ffffff'
    stroke-width='5'
    stroke-linecap='round'
    opacity='0.07'
    stroke-dasharray='60 600'
    stroke-dashoffset='30'
  />

  <!-- Seed (amber oval in the gap, at visual bottom) -->
  <g filter='url(#seedGlow)'>
    <ellipse cx='256' cy='400' rx='20' ry='27' fill='url(#seedGrad)' transform='rotate(-6, 256, 400)'/>
  </g>
  <!-- Seed surface crease -->
  <path
    d='M 253 378 C 251 388 251 407 253 418'
    stroke='#a06020'
    stroke-width='2'
    stroke-linecap='round'
    fill='none'
    opacity='0.45'
  />

  <!-- Leaf bud at arc tip (bottom-left endpoint: 178.5, 390.2) -->
  <!-- Small teardrop shape pointing upper-left (tangent to arc at that point) -->
  <!-- Arc tangent at 120° points perpendicular to radius → direction is 120°+90°=210° (or 30°) -->
  <!-- Leaf points inward/upward, centered at ~(162, 368) offset from arc tip -->
  <g filter='url(#budGlow)'>
    <ellipse
      cx='162' cy='366'
      rx='13' ry='20'
      fill='#8fce8d'
      transform='rotate(30, 162, 366)'
    />
    <!-- Small leaf vein -->
    <path
      d='M 162 380 C 160 370 162 360 164 352'
      stroke='#c8f0c6'
      stroke-width='2'
      stroke-linecap='round'
      fill='none'
      opacity='0.5'
    />
  </g>

</svg>
